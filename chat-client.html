<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>局域网聊天室</title>
    <style>
        :root {
            --bg-gradient-1: #1a1a2e;
            --bg-gradient-2: #16213e;
            --container-bg: rgba(255, 255, 255, 0.1);
            --header-gradient-1: #667eea;
            --header-gradient-2: #764ba2;
            --text-primary: #fff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --text-muted: rgba(255, 255, 255, 0.6);
            --input-bg: rgba(255, 255, 255, 0.9);
            --input-text: #333;
            --message-other-bg: rgba(255, 255, 255, 0.9);
            --message-other-text: #333;
            --sidebar-bg: rgba(0, 0, 0, 0.2);
            --sidebar-border: rgba(255, 255, 255, 0.1);
            --system-bg: rgba(255, 255, 255, 0.1);
            --emoji-picker-bg: rgba(30, 30, 50, 0.95);
            --message-font-size: 16px;
        }

        .light-mode {
            --bg-gradient-1: #e8eef5;
            --bg-gradient-2: #d1dbe6;
            --container-bg: rgba(255, 255, 255, 0.8);
            --text-primary: #1a1a2e;
            --text-secondary: rgba(0, 0, 0, 0.8);
            --text-muted: rgba(0, 0, 0, 0.6);
            --input-bg: rgba(255, 255, 255, 1);
            --input-text: #333;
            --message-other-bg: rgba(255, 255, 255, 1);
            --message-other-text: #333;
            --sidebar-bg: rgba(0, 0, 0, 0.05);
            --sidebar-border: rgba(0, 0, 0, 0.1);
            --system-bg: rgba(0, 0, 0, 0.08);
            --emoji-picker-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        *:not(input):not(textarea) {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: touch;
        }

        html {
            height: -webkit-fill-available;
        }

        .login-container {
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h1 {
            color: var(--text-primary);
            margin-bottom: 30px;
            font-size: 28px;
        }

        .login-container input {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            background: var(--input-bg);
            color: var(--input-text);
        }

        #passwordInput {
            display: none;
            margin-bottom: 0;
        }

        #passwordInput.show {
            display: block;
            margin-bottom: 20px;
        }

        .login-container button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .chat-container {
            display: none;
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, var(--header-gradient-1) 0%, var(--header-gradient-2) 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .chat-header h2 {
            color: white;
            font-size: 18px;
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: background 0.2s, transform 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        .online-users {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }

        .changelog-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
        }

        .changelog-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .changelog-btn.has-update {
            animation: pulseUpdate 2s infinite;
        }

        @keyframes pulseUpdate {
            0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }
        }

        .version-badge {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .changelog-icon {
            font-size: 14px;
        }

        .changelog-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--emoji-picker-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            width: 400px;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            z-index: 2000;
            display: none;
        }

        .changelog-panel.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        .changelog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .changelog-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .changelog-title h3 {
            color: var(--text-primary);
            margin: 0;
            font-size: 18px;
        }

        .changelog-current-version {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .changelog-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .changelog-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .changelog-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .changelog-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border-left: 3px solid #667eea;
        }

        .changelog-item.latest {
            border-left-color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .changelog-item-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .changelog-version {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .changelog-item.latest .changelog-version {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
        }

        .changelog-date {
            color: var(--text-muted);
            font-size: 12px;
        }

        .changelog-item.latest .changelog-date::after {
            content: ' (最新)';
            color: #4ade80;
            font-weight: 600;
        }

        .changelog-changes {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .changelog-changes li {
            color: var(--text-secondary);
            font-size: 13px;
            padding: 4px 0;
            padding-left: 16px;
            position: relative;
        }

        .changelog-changes li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #667eea;
        }

        .changelog-item.latest .changelog-changes li::before {
            color: #4ade80;
        }

        .update-reminder {
            text-align: center;
            padding: 15px;
            margin-top: 15px;
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.2) 0%, rgba(34, 197, 94, 0.2) 100%);
            border-radius: 10px;
            border: 1px solid rgba(74, 222, 128, 0.4);
        }

        .update-reminder p {
            color: var(--text-primary);
            margin: 0 0 10px 0;
            font-size: 14px;
        }

        .refresh-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-main {
            display: flex;
            height: calc(100% - 70px);
        }

        .messages-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .emoji-rain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .emoji-rain {
            position: absolute;
            font-size: 30px;
            will-change: transform, opacity;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        @keyframes emojiRain {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .message.own {
            text-align: right;
        }

        .message-bubble {
            display: inline-block;
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: var(--message-font-size);
            transition: font-size 0.2s ease;
        }

        .message.own .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.other .message-bubble {
            background: var(--message-other-bg);
            color: var(--message-other-text);
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            opacity: 0.7;
        }

        .system-message {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin: 10px 40px;
            padding: 8px 16px;
            background: var(--system-bg);
            border-radius: 20px;
            display: block;
        }

        .typing-indicator {
            padding: 10px 20px;
            color: var(--text-muted);
            font-size: 13px;
            height: 20px;
        }

        .input-container {
            padding: 15px 20px;
            background: var(--sidebar-bg);
            display: flex;
            gap: 10px;
            position: relative;
            align-items: center;
            overflow: visible;
        }

        .input-container input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            background: var(--input-bg);
            color: var(--input-text);
        }

        .input-container button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .input-container button:hover {
            transform: scale(1.05);
        }

        .input-container button:active {
            transform: scale(0.95);
        }

        .sidebar {
            width: 200px;
            background: var(--sidebar-bg);
            padding: 20px;
            border-left: 1px solid var(--sidebar-border);
        }

        .sidebar h3 {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .user-item:hover {
            background: var(--system-bg);
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-alias {
            font-size: 11px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .user-info-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--emoji-picker-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            min-width: 300px;
            max-width: 90vw;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            z-index: 2000;
            display: none;
        }

        .user-info-panel.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        .user-info-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .user-info-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: white;
        }

        .user-info-title {
            flex: 1;
        }

        .user-info-title h3 {
            color: var(--text-primary);
            margin: 0 0 4px 0;
            font-size: 18px;
        }

        .user-info-title small {
            color: var(--text-muted);
            font-size: 12px;
        }

        .user-info-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .user-info-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-info-row:last-child {
            border-bottom: none;
        }

        .user-info-label {
            color: var(--text-muted);
            font-size: 13px;
        }

        .user-info-value {
            color: var(--text-primary);
            font-size: 14px;
            text-align: right;
            word-break: break-all;
        }

        .user-info-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 14px;
            width: 100%;
            margin-top: 5px;
        }

        .user-info-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .user-info-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .user-info-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .user-info-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .user-info-btn:hover {
            transform: scale(1.02);
        }

        .user-info-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .user-info-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .user-info-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1999;
            display: none;
        }

        .user-info-overlay.show, .changelog-overlay.show {
            display: block;
        }

        .alias-tag {
            display: inline-block;
            background: rgba(102, 126, 234, 0.3);
            color: var(--text-primary);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 6px;
        }

        .game-panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1999;
            display: none;
        }

        .game-panel-overlay.show {
            display: block;
        }

        .game-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--emoji-picker-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            min-width: 320px;
            max-width: 90vw;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            z-index: 2000;
            display: none;
        }

        .game-panel.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        .game-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .game-panel-header h3 {
            color: var(--text-primary);
            font-size: 18px;
            margin: 0;
        }

        .game-panel-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .game-panel-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .game-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            transition: background 0.2s;
        }

        .game-item:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .game-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .game-info {
            flex: 1;
        }

        .game-name {
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .game-desc {
            color: var(--text-muted);
            font-size: 12px;
        }

        .game-team-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .game-team-btn:hover {
            transform: scale(1.05);
        }

        .game-team-btn:active {
            transform: scale(0.95);
        }

        .team-invite-message {
            display: inline-block;
            padding: 12px 16px;

            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .image-preview-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .image-preview-wrapper {
            max-height: 200px;
            overflow: hidden;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
        }

        .image-preview-img {
            max-width: 100%;
            max-height: 200px;
            display: block;
            margin: 0 auto;
            border-radius: 10px;
        }

        .image-preview-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .image-send-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .image-send-btn:hover {
            transform: scale(1.02);
        }

        .image-cancel-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: transparent;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .image-cancel-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .message-image:hover {
            transform: scale(1.02);
        }

        .paste-hint {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--emoji-picker-bg);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 50;
        }

        .paste-hint.show {
            opacity: 1;
        }

        .image-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .image-preview-container {
                left: 10px;
                right: 10px;
                bottom: 65px;
                padding: 12px;
            }

            .message-image {
                max-height: 200px;
            }
        }
    </style>
</head>

                    <button class="user-info-btn primary" id="setPasswordBtn" style="padding: 6px 12px; font-size: 12px;">设置</button>
                    <button class="user-info-btn secondary" id="removePasswordBtn" style="padding: 6px 12px; font-size: 12px;">移除</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const loginContainer = document.getElementById('loginContainer');
        const chatContainer = document.getElementById('chatContainer');
        const usernameInput = document.getElementById('usernameInput');
        const joinBtn = document.getElementById('joinBtn');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const onlineCount = document.getElementById('onlineCount');
        const userList = document.getElementById('userList');
        const typingIndicator = document.getElementById('typingIndicator');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const themeToggle = document.getElementById('themeToggle');
        const historyUsersDiv = document.getElementById('historyUsers');
        const atList = document.getElementById('atList');
        const fontSizeBtn = document.getElementById('fontSizeBtn');
        const fontSizePanel = document.getElementById('fontSizePanel');
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeValue = document.getElementById('fontSizeValue');
        const fontSizePreview = document.getElementById('fontSizePreview');
        const notificationBtn = document.getElementById('notificationBtn');
        const unreadBadge = document.getElementById('unreadBadge');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imagePreviewImg = document.getElementById('imagePreviewImg');
        const imagePreviewClose = document.getElementById('imagePreviewClose');
        const imageSendBtn = document.getElementById('imageSendBtn');
        const imageCancelBtn = document.getElementById('imageCancelBtn');
        const pasteHint = document.getElementById('pasteHint');
        const imageBtn = document.getElementById('imageBtn');
        const imageInput = document.getElementById('imageInput');
        const userInfoPanel = document.getElementById('userInfoPanel');
        const userInfoOverlay = document.getElementById('userInfoOverlay');
        const userInfoClose = document.getElementById('userInfoClose');
        const userInfoAvatar = document.getElementById('userInfoAvatar');
        const userInfoName = document.getElementById('userInfoName');
        const userInfoIP = document.getElementById('userInfoIP');
        const userInfoUsername = document.getElementById('userInfoUsername');
        const userInfoIPAddress = document.getElementById('userInfoIPAddress');
        const userInfoJoinTime = document.getElementById('userInfoJoinTime');
        const userAliasInput = document.getElementById('userAliasInput');
        const userInfoCancel = document.getElementById('userInfoCancel');
        const userInfoSave = document.getElementById('userInfoSave');
        const userUsernameInput = document.getElementById('userUsernameInput');
        const userAvatarInput = document.getElementById('userAvatarInput');
        const userAvatarColor = document.getElementById('userAvatarColor');
        const usernameRow = document.getElementById('usernameRow');
        const avatarRow = document.getElementById('avatarRow');
        const gameBtn = document.getElementById('gameBtn');
        const gamePanel = document.getElementById('gamePanel');
        const gamePanelOverlay = document.getElementById('gamePanelOverlay');
        const gamePanelClose = document.getElementById('gamePanelClose');
        const changelogBtn = document.getElementById('changelogBtn');
        const changelogPanel = document.getElementById('changelogPanel');
        const changelogOverlay = document.getElementById('changelogOverlay');
        const changelogClose = document.getElementById('changelogClose');
        const changelogList = document.getElementById('changelogList');
        const versionBadge = document.getElementById('versionBadge');
        const currentVersion = document.getElementById('currentVersion');

        let appVersion = '1.6.0';
        let hasNewVersion = false;

        let socket = null;
        let username = '';
               let myIP = '';
        let hasJoined = false;
        let roomName = '局域网聊天室';
        let isTyping = false;
        let typingTimeout = null;
        let isLightMode = localStorage.getItem('theme') === 'light';
        let onlineUsersList = [];
        let usersData = new Map();
        let currentFontSize = parseInt(localStorage.getItem('chatFontSize')) || 16;
        let isNotificationEnabled = localStorage.getItem('notificationEnabled') !== 'false';
        let unreadCount = 0;
        let originalTitle = document.title;
        let audioContext = null;
        let pendingImageData = null;
        let currentViewingUser = null;
        let pendingTeamInvites = new Map();
        let activeGameRooms = new Map();

        function updateRoomNameDisplay() {
            const loginTitle = document.getElementById('loginTitle');
            const chatTitle = document.getElementById('chatTitle');
            if (loginTitle) loginTitle.textContent = roomName;
            if (chatTitle) chatTitle.textContent = roomName;
            document.title = roomName + (username ? ' - ' + username : '');
            originalTitle = roomName + (username ? ' - ' + username : '');
        }

        function getUserAliases() {
            return JSON.parse(localStorage.getItem('userAliases') || '{}');
        }

        function saveUserAlias(ip, alias) {
            const aliases = getUserAliases();
            aliases[ip] = alias;
            localStorage.setItem('userAliases', JSON.stringify(aliases));
        }

        function getUserAlias(ip) {
            return getUserAliases()[ip] || '';
        }

        function getUserAvatars() {
            return JSON.parse(localStorage.getItem('userAvatars') || '{}');
        }

        function saveUserAvatar(ip, avatar) {
            const avatars = getUserAvatars();
            avatars[ip] = avatar;
            localStorage.setItem('userAvatars', JSON.stringify(avatars));
        }

        function getUserAvatar(ip) {
            return getUserAvatars()[ip] || '';
        }

        function getUserAvatarDisplay(userData) {
            if (userData.avatar && userData.avatar.length > 0) {
                return [...userData.avatar][0];
            }
            const customAvatar = getUserAvatar(userData.ip);
            if (customAvatar && customAvatar.length > 0) {
                return [...customAvatar][0];
            }
            return [...userData.username][0].toUpperCase();
        }

        function getUserAvatarColorDisplay(userData) {
            if (userData.avatarColor) {
                return userData.avatarColor;
            }
            return getAvatarColor(userData.username);
        }

        function getDisplayName(userData) {
            const alias = getUserAlias(userData.ip);
            return alias || userData.username;
        }

        function showUserInfo(userData) {
            currentViewingUser = userData;
            const color = getUserAvatarColorDisplay(userData);
            const avatarDisplay = getUserAvatarDisplay(userData);
            const alias = getUserAlias(userData.ip);
            const customAvatar = getUserAvatar(userData.ip);
            const isSelf = userData.ip === myIP || (myIP === '' && userData.username === username);
            
            console.log('showUserInfo:', { 
                userData, 
                myIP, 
                currentUsername: username, 
                isSelf 
            });
            
            userInfoAvatar.style.background = color;
            userInfoAvatar.textContent = avatarDisplay;
            userInfoName.textContent = alias || userData.username;
            userInfoIP.textContent = `IP: ${userData.ip}`;
            userInfoUsername.textContent = userData.username;
            userInfoIPAddress.textContent = userData.ip;
            userInfoJoinTime.textContent = userData.joinTime ? new Date(userData.joinTime).toLocaleString() : '未知';
            userAliasInput.value = alias;
            userAvatarInput.value = userData.avatar || customAvatar;
            userAvatarColor.value = userData.avatarColor || color;
            userUsernameInput.value = userData.username;
            
            usernameRow.style.display = isSelf ? 'flex' : 'none';
            avatarRow.style.display = isSelf ? 'flex' : 'none';
            
            const hostControls = document.getElementById('hostControls');
            const currentPasswordDisplay = document.getElementById('currentPasswordDisplay');
            const currentPasswordValue = document.getElementById('currentPasswordValue');
            
            if (isSelf && window.isHost) {
                hostControls.style.display = 'flex';
                socket.emit('getRoomPassword', (response) => {
                    if (response.success && response.password) {
                        currentPasswordValue.textContent = response.password;
                        currentPasswordDisplay.style.display = 'block';
                    } else {
                        currentPasswordDisplay.style.display = 'none';
                    }
                });
            } else {
                hostControls.style.display = 'none';
            }
            
            userInfoPanel.classList.add('show');
            userInfoOverlay.classList.add('show');
        }

        function hideUserInfo() {
            userInfoPanel.classList.remove('show');
            userInfoOverlay.classList.remove('show');
            currentViewingUser = null;
        }

        userInfoClose.addEventListener('click', hideUserInfo);
        userInfoOverlay.addEventListener('click', hideUserInfo);
        userInfoCancel.addEventListener('click', hideUserInfo);

        userInfoSave.addEventListener('click', () => {
            if (!currentViewingUser) return;
            
            const isSelf = currentViewingUser.ip === myIP || (myIP === '' && currentViewingUser.username === username);
            console.log('保存设置:', { 
                currentViewingUser,
                myIP,
                username,
                isSelf,
                socketConnected: socket?.connected 
            });
            const alias = userAliasInput.value.trim();
            
            saveUserAlias(currentViewingUser.ip, alias);
            
            if (isSelf && socket && socket.connected) {
                const avatar = userAvatarInput.value.trim();
                const avatarColorVal = userAvatarColor.value;
                const newUsername = userUsernameInput.value.trim();
                
                const updateData = {};
                if (newUsername && newUsername !== username) {
                    updateData.username = newUsername;
                    username = newUsername;
                    localStorage.setItem('chatUsername', newUsername);
                    originalTitle = '局域网聊天室 - ' + newUsername;
                }
                updateData.avatar = avatar;
                updateData.avatarColor = avatarColorVal;
                
                console.log('发送 updateProfile:', updateData);
                socket.emit('updateProfile', updateData);
            }
            
            hideUserInfo();
        });

        document.getElementById('setRoomNameBtn').addEventListener('click', () => {
            const name = document.getElementById('roomNameInput').value.trim();
            if (!name) {
                alert('请输入房间名称');
                return;
            }
            socket.emit('setRoomName', { name }, (response) => {
                if (response.success) {
                    document.getElementById('roomNameInput').value = '';
                } else {
                    alert(response.message);
                }
            });
        });

        document.getElementById('setPasswordBtn').addEventListener('click', () => {
            const password = document.getElementById('roomPasswordInput').value.trim();
            if (!password) {
                alert('请输入密码');
                return;
            }
            if (confirm('确定要设置房间密码吗？设置后新用户进入时需要输入密码。')) {
                socket.emit('setRoomPassword', { password }, (response) => {
                    if (response.success) {
                        alert('房间密码已设置');
                        document.getElementById('roomPasswordInput').value = '';
                        document.getElementById('currentPasswordValue').textContent = password;
                        document.getElementById('currentPasswordDisplay').style.display = 'block';
                    } else {
                        alert(response.message);
                    }

        function playNotificationSound() {
            if (!isNotificationEnabled) return;
            
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                if (audioContext.state === 'suspended') {
                    audioContext.resume().then(() => {
                        playSoundInternal();
                    });
                } else {
                    playSoundInternal();
                }
            } catch (e) {
                console.log('音频播放失败:', e);
            }
        }

        function playSoundInternal() {
            const now = audioContext.currentTime;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(587.33, now);
            oscillator.frequency.setValueAtTime(783.99, now + 0.15);
            
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.5, now + 0.05);
            gainNode.gain.setValueAtTime(0.5, now + 0.15);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
            
            oscillator.start(now);
            oscillator.stop(now + 0.4);
        }

        function initEmojiPicker() {
            const grids = [
                { id: 'emojiGrid1', category: 'faces' },
                { id: 'emojiGrid2', category: 'gestures' },
                { id: 'emojiGrid3', category: 'animals' },
                { id: 'emojiGrid4', category: 'food' },
                { id: 'emojiGrid5', category: 'activities' },
                { id: 'emojiGrid6', category: 'objects' },
                { id: 'emojiGrid7', category: 'symbols' }
            ];
            
            grids.forEach(({ id, category }) => {
                const grid = document.getElementById(id);
                if (grid && emojiCategories[category]) {
                    emojiCategories[category].forEach(emoji => {
                        const span = document.createElement('span');
                        span.className = 'emoji-item';
                        span.textContent = emoji;
                        span.addEventListener('click', () => insertEmoji(emoji));
                        grid.appendChild(span);
                    });
                }
            });
        }

        function insertEmoji(emoji) {
            const start = messageInput.selectionStart;
            const end = messageInput.selectionEnd;
            const text = messageInput.value;
            messageInput.value = text.substring(0, start) + emoji + text.substring(end);
            messageInput.selectionStart = messageInput.selectionEnd = start + emoji.length;
            messageInput.focus();
        }

        emojiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            emojiPicker.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) {
                emojiPicker.classList.remove('show');
            }
        });

        initEmojiPicker();

        const avatarColors = [
            '#e74c3c', '#3498db', '#2ecc71', '#9b59b6', '#f39c12',
            '#1abc9c', '#e67e22', '#34495e', '#16a085', '#c0392b'
        ];

        function isEmojiOnly(text) {
            if (!text || text.trim().length === 0) return false;
            const emojiRegex = /^[\p{Emoji}\p{Emoji_Component}\p{Emoji_Modifier}\p{Emoji_Modifier_Base}\p{Emoji_Presentation}]+$/u;
            return emojiRegex.test(text.trim());
        }

        function countEmojis(text) {
            const emojiRegex = /\p{Emoji}/gu;
            const matches = text.match(emojiRegex);
            return matches ? matches.length : 0;
        }

        function getAvatarColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return avatarColors[Math.abs(hash) % avatarColors.length];
        }

        function connect() {
            socket = io({
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 5,
                reconnectionDelay: 1000,
                query: {
                    version: appVersion
                }
            });

            socket.on('connect', () => {
                console.log('已连接到服务器');
                socket.emit('checkPassword', {}, (response) => {
                    console.log('checkPassword response:', response);
                    const passwordInput = document.getElementById('passwordInput');
                    if (response.needPassword) {
                        passwordInput.classList.add('show');
                        passwordInput.focus();
                        joinBtn.textContent = '输入密码后加入';
                    } else {
                        passwordInput.classList.remove('show');
                        socket.emit('join', { username });
                    }
                });
            });

            socket.on('disconnect', () => {
                addSystemMessage('连接已断开，正在重连...');
            });

            socket.on('connect_error', (error) => {
                console.error('连接错误:', error);
                addSystemMessage('无法连接到服务器，请检查服务器是否运行');
            });

            socket.on('system', (msg) => {
                addSystemMessage(msg);
            });

            socket.on('message', (data) => {
                console.log('Socket 收到消息:', data);
                addMessage(data);
            });

            socket.on('emojiRain', (data) => {
                console.log('收到emojiRain广播:', data);
                triggerEmojiRain(data.emojis);
            });

            socket.on('mentionReadUpdate', (data) => {
                const { messageId, mentionUser, read } = data;
                const msgDiv = document.querySelector(`.message[data-message-id="${messageId}"]`);
                if (msgDiv) {
                    const checkMark = msgDiv.querySelector(`.mention-read[data-mention-user="${mentionUser}"]`);
                    if (checkMark && read) {
                        checkMark.classList.add('read');

            socket.on('myInfo', (data) => {

                window.isHost = data.isHost || false;

                chatContainer.style.display = 'block';

        function addMessage(data) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${data.username === username ? 'own' : 'other'}`;
            if (data.id) {
                msgDiv.dataset.messageId = data.id;
            }
            
            const senderDiv = document.createElement('div');
            senderDiv.className = 'message-sender';
            
            const alias = getUserAlias(data.ip);
            senderDiv.textContent = alias || data.username;
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.style.fontSize = currentFontSize + 'px';

            let isMentioned = false;
            const isOwnMessage = data.username === username;
            
            if (data.type === 'image' && data.image) {
                console.log('处理图片消息');
                const img = document.createElement('img');
                img.className = 'message-image';
                img.src = data.image;
                img.alt = '图片消息';
                img.loading = 'lazy';
                
                img.addEventListener('error', (e) => {
                    console.error('图片加载失败:', e);
                });
                
                img.addEventListener('load', () => {
                    console.log('图片加载成功');
                });
                
                img.addEventListener('click', () => {
                    const modal = document.createElement('div');
                    modal.style.cssText = `
                        position: fixed;
                        top: 0;
                        left: 0;
                        right: 0;
                        bottom: 0;
                        background: rgba(0, 0, 0, 0.9);
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        z-index: 10000;
                        cursor: zoom-out;
                    `;
                    
                    const fullImg = document.createElement('img');
                    fullImg.src = data.image;
                    fullImg.style.cssText = `
                        max-width: 90%;
                        max-height: 90%;
                        border-radius: 10px;
                    `;
                    
                    modal.appendChild(fullImg);
                    modal.addEventListener('click', () => modal.remove());
                    document.body.appendChild(modal);
                });
                
                bubbleDiv.appendChild(img);
            } else {
                const text = data.text || '';
                const mentionRegex = /@([^\s@]+)/g;
                const parts = text.split(mentionRegex);
                
                let html = '';
                for (let i = 0; i < parts.length; i++) {
                    if (i % 2 === 0) {
                        html += parts[i].replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    } else {
                        const mentionedUser = parts[i];
                        if (mentionedUser === username) {
                            isMentioned = true;
                        }
                        if (onlineUsersList.includes(mentionedUser) || mentionedUser === username) {
                            if (isOwnMessage) {
                                html += `<span class="mention" data-mention-user="${mentionedUser}">@${mentionedUser}<span class="mention-read" data-mention-user="${mentionedUser}">✓</span></span>`;
                            } else {
                                html += `<span class="mention">@${mentionedUser}</span>`;
                            }
                        } else {
                            html += `@${mentionedUser}`;
                        }
                    }
                }
                bubbleDiv.innerHTML = html;
                
                const cleanText = text.replace(/@[^\s@]+/g, '').trim();
                if (isEmojiOnly(cleanText) && countEmojis(cleanText) <= 3) {
                    bubbleDiv.style.fontSize = '36px';
                    bubbleDiv.style.lineHeight = '1.2';
                }
            }
            
            if (isMentioned && data.username !== username) {
                msgDiv.classList.add('flash-bubble');
            }
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = data.time;
            
            if (data.username !== username) {
                msgDiv.appendChild(senderDiv);
                incrementUnread();
            }
            msgDiv.appendChild(bubbleDiv);
            msgDiv.appendChild(timeDiv);
            
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            if (isMentioned && !isOwnMessage && data.id) {
                const mentions = data.mentions || [];
                mentions.forEach(mentionedUser => {
                    if (mentionedUser === username) {
                        if (!document.hidden) {
                            socket.emit('mentionRead', {
                                messageId: data.id,
                                mentionUser: mentionedUser,
                                readerName: username
                            });
                        } else {
                            if (!window.pendingMentionReads) {
                                window.pendingMentionReads = [];
                            }
                            window.pendingMentionReads.push({
                                messageId: data.id,
                                mentionUser: mentionedUser
                            });
                        }
                    }
                });
            }

            cacheMessage(data);
        }

        function getCachedMessages() {
            try {
                const cached = localStorage.getItem('chatMessagesCache');
                return cached ? JSON.parse(cached) : [];
            } catch (e) {
                return [];
            }
        }

        function cacheMessage(data) {
            if (data.type === 'image' && data.image && data.image.length > 100000) {
                return;
            }

            const messages = getCachedMessages();
            messages.push({
                username: data.username,
                ip: data.ip,
                text: data.text,
                type: data.type,
                image: data.type === 'image' ? data.image : null,
                time: data.time
            });

            if (messages.length > 100) {
                messages.splice(0, messages.length - 100);
            }

            try {
                localStorage.setItem('chatMessagesCache', JSON.stringify(messages));
            } catch (e) {
                messages.splice(0, 20);
                try {
                    localStorage.setItem('chatMessagesCache', JSON.stringify(messages));
                } catch (e2) {
                    console.log('缓存消息失败');
                }
            }
        }

        function loadCachedMessages() {
            const messages = getCachedMessages();
            if (messages.length > 0) {
                const hintDiv = document.createElement('div');
                hintDiv.className = 'system-message';
                hintDiv.textContent = `--- 以上是最近 ${messages.length} 条历史消息 ---`;
                messagesDiv.appendChild(hintDiv);

                messages.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${msg.username === username ? 'own' : 'other'}`;
                    
                    const senderDiv = document.createElement('div');
                    senderDiv.className = 'message-sender';
                    const alias = getUserAlias(msg.ip);
                    senderDiv.textContent = alias || msg.username;
                    
                    const bubbleDiv = document.createElement('div');
                    bubbleDiv.className = 'message-bubble';
                    bubbleDiv.style.fontSize = currentFontSize + 'px';

                    let isMentioned = false;
                    
                    if (msg.type === 'image' && msg.image) {
                        const img = document.createElement('img');
                        img.className = 'message-image';
                        img.src = msg.image;
                        img.alt = '图片消息';
                        img.loading = 'lazy';
                        img.addEventListener('click', () => {
                            const modal = document.createElement('div');
                            modal.style.cssText = `
                                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                                background: rgba(0, 0, 0, 0.9); display: flex;
                                align-items: center; justify-content: center;
                                z-index: 10000; cursor: zoom-out;
                            `;
                            const fullImg = document.createElement('img');
                            fullImg.src = msg.image;
                            fullImg.style.cssText = 'max-width: 90%; max-height: 90%; border-radius: 10px;';
                            modal.appendChild(fullImg);
                            modal.addEventListener('click', () => modal.remove());
                            document.body.appendChild(modal);
                        });
                        bubbleDiv.appendChild(img);
                    } else {
                        const text = msg.text || '';
                        const mentionRegex = /@([^\s@]+)/g;
                        const parts = text.split(mentionRegex);
                        
                        let html = '';
                        for (let i = 0; i < parts.length; i++) {
                            if (i % 2 === 0) {
                                html += parts[i].replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                            } else {
                                const mentionedUser = parts[i];
                                if (mentionedUser === username) {
                                    isMentioned = true;
                                }
                                html += `<span class="mention">@${mentionedUser}</span>`;
                            }
                        }
                        bubbleDiv.innerHTML = html;
                        
                        const cleanText = text.replace(/@[^\s@]+/g, '').trim();
                        if (isEmojiOnly(cleanText) && countEmojis(cleanText) <= 3) {
                            bubbleDiv.style.fontSize = '36px';
                            bubbleDiv.style.lineHeight = '1.2';
                        }
                    }

                    if (isMentioned && msg.username !== username) {
                        msgDiv.classList.add('flash-bubble');
                    }
                    
                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'message-time';
                    timeDiv.textContent = msg.time;
                    
                    if (msg.username !== username) {
                        msgDiv.appendChild(senderDiv);
                    }
                    msgDiv.appendChild(bubbleDiv);
                    msgDiv.appendChild(timeDiv);
                    messagesDiv.appendChild(msgDiv);
                });
                
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }

                <div class="game-start-message">
                    <div class="game-start-header">
                        <span class="game-start-icon">${icon}</span>
                        <span class="game-start-title">${gameName}开始</span>
                    </div>
                    <div class="game-start-content">${data.text.replace(/\n/g, '<br>')}</div>
                </div>
            `;

            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = data.time;

            msgDiv.appendChild(bubbleDiv);
            msgDiv.appendChild(timeDiv);

            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            incrementUnread();
        }

        function updateUserList(users) {
            usersData.clear();
            users.forEach(user => {
                usersData.set(user.id, user);
            });
            
            const myUserData = users.find(u => u.username === username);
            if (myUserData && myUserData.ip) {
                myIP = myUserData.ip;
                console.log('updateUserList 设置 myIP:', myIP);
            }
            
            onlineUsersList = users.map(u => u.username);
            onlineCount.textContent = `${users.length} 人在线`;
            document.getElementById('sidebarOnlineCount').textContent = `(${users.length})`;
            
            updateUserListUI();
        }

        function updateUserListUI() {
            const users = Array.from(usersData.values());
            
            userList.innerHTML = users.map(user => {
                const color = getUserAvatarColorDisplay(user);
                const avatarDisplay = getUserAvatarDisplay(user);
                const displayName = getDisplayName(user);
                const alias = getUserAlias(user.ip);
                const isSelf = user.ip === myIP || (myIP === '' && user.username === username);
                
                return `
                    <div class="user-item" data-user-id="${user.id}">
                        <div class="user-avatar" style="background: ${color}">${avatarDisplay}</div>
                        <div class="user-info">
                            <div class="user-name">${displayName}${isSelf ? ' (我)' : ''}</div>
                            ${alias ? `<div class="user-alias">${user.username}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
            
            userList.querySelectorAll('.user-item').forEach(item => {
                item.addEventListener('click', () => {
                    const userId = item.dataset.userId;
                    const userData = usersData.get(userId);
                    if (userData) {
                        showUserInfo(userData);
                    }
                });
            });
        }

        function sendMessage() {
            if (!hasJoined) return;
            if (pendingImageData) {
                sendImageMessage();
                return;
            }
            
            const text = messageInput.value.trim();
            if (text && socket && socket.connected) {
                checkEmojiEgg(text);
                socket.emit('message', { 
                    text,
                    type: 'text'
                });
                messageInput.value = '';
                handleTyping(false);
                atList.classList.remove('show');
            }
        }

        function checkEmojiEgg(text) {
            if (!hasJoined) return;
            const emojis = text.match(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu);
            console.log('检测emoji:', text, emojis);
            if (emojis && emojis.length >= 3) {
                console.log('触发emoji雨:', emojis);
                socket.emit('emojiRain', { emojis });
            }
        }

        function triggerEmojiRain(emojis) {
            const container = document.createElement('div');
            container.className = 'emoji-rain-container';
            document.body.appendChild(container);

            const duration = 3000;
            const startTime = Date.now();
            const interval = 50;

            const timer = setInterval(() => {
                if (Date.now() - startTime >= duration) {
                    clearInterval(timer);
                    setTimeout(() => container.remove(), 2000);
                    return;
                }
                const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
                createEmojiDrop(container, randomEmoji);
            }, interval);
        }

        function createEmojiDrop(container, emoji) {
            const el = document.createElement('div');
            el.className = 'emoji-rain';
            el.textContent = emoji;
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = '-100px';
            el.style.fontSize = (20 + Math.random() * 40) + 'px';
            el.style.opacity = 0.7 + Math.random() * 0.3;
            el.style.animation = `emojiRain ${2 + Math.random() * 2}s linear forwards`;
            container.appendChild(el);

            setTimeout(() => el.remove(), 4000);
        }

        function handleTyping(typing) {
            if (!hasJoined) return;
            if (isTyping !== typing) {
                isTyping = typing;
                socket.emit('typing', typing);
            }
            
            if (typing) {
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    isTyping = false;
                    socket.emit('typing', false);
                }, 2000);
            }
        }

        joinBtn.addEventListener('click', () => {
            const name = usernameInput.value.trim();
            if (name) {
                username = name;
                localStorage.setItem('chatUsername', name);
                saveHistoryUser(name);
                
                console.log('joinBtn clicked, username:', username, 'socket connected:', socket?.connected);
                
                if (!socket || !socket.connected) {
                    connect();
                } else {
                    const passwordInput = document.getElementById('passwordInput');
                    if (passwordInput.classList.contains('show')) {
                        const password = passwordInput.value;
                        if (!password) {
                            alert('请输入房间密码');
                            passwordInput.focus();
                            return;
                        }
                        console.log('sending join with password');
                        socket.emit('join', { username, password });
                    } else {
                        tryJoin();
                    }
                }
            }
        });

        function tryJoin() {
            socket.emit('checkPassword', {}, (response) => {
                console.log('tryJoin checkPassword response:', response);
                const passwordInput = document.getElementById('passwordInput');
                if (response.needPassword) {
                    passwordInput.classList.add('show');
                    passwordInput.focus();
                    joinBtn.textContent = '输入密码后加入';
                } else {
                    passwordInput.classList.remove('show');
                    socket.emit('join', { username });
                }
            });
        }

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                joinBtn.click();
            }
        });

        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                joinBtn.click();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        usernameInput.focus();

        if ('visualViewport' in window) {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);

            window.visualViewport.addEventListener('resize', () => {
                document.documentElement.style.setProperty('--vh', `${window.visualViewport.height * 0.01}px`);
            });
        }

        messageInput.addEventListener('focus', () => {
            setTimeout(() => {
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }, 300);
            clearUnread();
        });

        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            const touchY = e.touches[0].clientY;
            const touchDiff = touchStartY - touchY;
            
            if (messagesDiv.scrollTop === 0 && touchDiff < 0) {
                e.preventDefault();
            }
        }, { passive: false });

        if (window.matchMedia('(max-width: 768px)').matches) {
            const style = document.createElement('style');
            style.textContent = `
                .chat-container {
                    height: 100vh;
                    height: calc(var(--vh, 1vh) * 100);
                }
            `;
            document.head.appendChild(style);
        }
    </script>
</body>
</html>
