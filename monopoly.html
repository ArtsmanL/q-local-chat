<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大富翁</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
        }

        .game-container {
            display: flex;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .players-panel {
            width: 220px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .player-card.active {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            animation: cardPulse 1.5s infinite;
        }

        @keyframes cardPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .turn-badge {
            display: block;
            text-align: center;
            font-size: 12px;
            color: #ffd700;
            background: rgba(255, 215, 0, 0.2);
            padding: 4px 8px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .player-piece {
            font-size: 32px;
            text-align: center;
            margin-bottom: 10px;
            width: 50px;
            height: 50px;
            line-height: 46px;
            border-radius: 50%;
            border: 3px solid;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 auto 10px;
        }

        .player-piece.turn {
            animation: piecePulse 1s infinite;
        }

        @keyframes piecePulse {
            0%, 100% { box-shadow: 0 0 10px currentColor; }
            50% { box-shadow: 0 0 25px currentColor, 0 0 40px currentColor; }
        }

        .player-name {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
        }

        .player-money {
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }

        .player-money::before { content: '$'; margin-right: 2px; }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .game-title {
            color: #ffd700;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .game-status {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            margin-top: 8px;
        }

        .board-container {
            position: relative;
            width: 700px;
            height: 700px;
        }

        .board {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .cell {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .cell-name {
            color: #fff;
            font-size: 9px;
            text-align: center;
            padding: 1px 2px;
            word-break: break-all;
            line-height: 1.1;
        }

        .cell-price {
            color: #ffd700;
            font-size: 8px;
            margin-top: 1px;
        }

        .cell.start { 
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            border-color: #00b894;
        }
        .cell.jail { 
            background: linear-gradient(135deg, #636e72 0%, #2d3436 100%);
            border-color: #636e72;
        }
        .cell.parking { 
            background: linear-gradient(135deg, #0984e3 0%, #74b9ff 100%);
            border-color: #0984e3;
        }
        .cell.jail { 
            background: linear-gradient(135deg, #d63031 0%, #ff7675 100%);
            border-color: #d63031;
        }
        .cell.chance { 
            background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%);
            border-color: #fd79a8;
        }
        .cell.tax { 
            background: linear-gradient(135deg, #fdcb6e 0%, #f39c12 100%);
            border-color: #fdcb6e;
        }

        .center-area {
            position: absolute;
            top: 80px;
            left: 80px;
            width: 540px;
            height: 540px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .center-logo {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .dice-container {
            display: flex;
            gap: 20px;
        }

        .dice {
            width: 60px;
            height: 60px;
            background: #fff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s;
        }

        .dice.rolling { animation: shake 0.5s infinite; }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        .current-turn-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 215, 0, 0.1) 100%);
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 25px;
            margin-bottom: 15px;
            animation: indicatorPulse 1.5s infinite;
        }

        @keyframes indicatorPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); }
        }

        .turn-piece {
            font-size: 28px;
            animation: pieceBounce 0.5s infinite;
        }

        @keyframes pieceBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .turn-name {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }

        .roll-btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);
        }

        .roll-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(243, 156, 18, 0.6); }
        .roll-btn:disabled { background: #555; cursor: not-allowed; box-shadow: none; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay-title {
            color: #ffd700;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .overlay-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .waiting-players {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .waiting-player {
            color: #fff;
            font-size: 16px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .waiting-player .name { flex: 1; }

        .waiting-player .host-badge {
            background: #ffd700;
            color: #000;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .waiting-player .robot-badge {
            background: #9b59b6;
            color: #fff;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .waiting-player .remove-robot {
            background: #e74c3c;
            color: #fff;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            margin-left: 5px;
        }

        .waiting-player .remove-robot:hover {
            background: #c0392b;
        }

        .robot-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .add-robot-btn {
            padding: 10px 20px;
            font-size: 14px;
            color: #fff;
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-robot-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(155, 89, 182, 0.5); }
        .add-robot-btn:disabled { background: #555; cursor: not-allowed; box-shadow: none; }

        .start-btn {
            padding: 15px 50px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(46, 204, 113, 0.6); }
        .start-btn:disabled { background: #555; cursor: not-allowed; box-shadow: none; }

        .pieces-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 12px;
            max-width: 600px;
        }

        .piece-option {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .piece-option .color-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 6px;
            border-radius: 0 0 12px 12px;
        }

        .piece-option:hover { transform: scale(1.1); }
        .piece-option.selected { border-color: #ffd700; box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .piece-option.disabled { opacity: 0.3; cursor: not-allowed; }

        .confirm-btn {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .confirm-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(46, 204, 113, 0.6); }
        .confirm-btn:disabled { background: #555; cursor: not-allowed; }

        .player-marker {
            position: absolute;
            font-size: 24px;
            z-index: 10;
            transition: left 0.15s ease-out, top 0.15s ease-out;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            border: 2px solid;
        }

        .player-marker.jumping {
            animation: jump 0.2s ease;
        }

        @keyframes jump {
            0% { transform: translateY(0) scale(1); }
            40% { transform: translateY(-20px) scale(1.2); }
            100% { transform: translateY(0) scale(1); }
        }

        .countdown-display {
            font-size: 120px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 50px rgba(255, 215, 0, 0.8);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .info-panel {
            width: 220px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .info-title {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 15px;
            text-align: center;
        }

        .info-item {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .broadcast-panel {
            width: 280px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .broadcast-title {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .broadcast-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .broadcast-item {
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            animation: slideIn 0.3s ease;
            line-height: 1.4;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .broadcast-item.buy { border-left: 3px solid #2ecc71; }
        .broadcast-item.rent { border-left: 3px solid #e74c3c; }
        .broadcast-item.build { border-left: 3px solid #3498db; }
        .broadcast-item.tax { border-left: 3px solid #f39c12; }
        .broadcast-item.chance { border-left: 3px solid #9b59b6; }
        .broadcast-item.start { border-left: 3px solid #1abc9c; }
        .broadcast-item.jail { border-left: 3px solid #636e72; }

        .exit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(231, 76, 60, 0.8);
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            z-index: 10;
        }

        .exit-btn:hover { background: rgba(231, 76, 60, 1); }

        .land-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .land-modal.show { display: flex; }

        .land-modal-content {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 24px;
            padding: 0;
            min-width: 500px;
            max-width: 600px;
            border: none;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .sell-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 250;
        }

        .sell-modal.show { display: flex; }

        .sell-modal-content {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 24px;
            padding: 0;
            min-width: 550px;
            max-width: 650px;
            border: none;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            animation: modalPop 0.3s ease;
        }

        .sell-modal-header {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.2) 0%, rgba(231, 76, 60, 0.1) 100%);
            padding: 25px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sell-modal-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .sell-modal-header h2 {
            color: #e74c3c;
            font-size: 24px;
            margin: 0;
        }

        .sell-modal-body {
            padding: 25px 30px;
            max-height: 400px;
            overflow-y: auto;
        }

        .sell-info {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(231, 76, 60, 0.1);
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .sell-info strong {
            color: #e74c3c;
            font-size: 22px;
        }

        .sell-assets {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sell-asset-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .sell-asset-item:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(5px);
        }

        .sell-asset-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sell-asset-name {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
        }

        .sell-asset-detail {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        .sell-asset-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sell-asset-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }

        .sell-asset-btn.sell-house {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        }

        .sell-asset-btn.sell-house:hover {
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);
        }

        .sell-modal-buttons {
            padding: 20px 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .sell-modal-btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sell-modal-btn.bankrupt {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
        }

        .sell-modal-btn.bankrupt:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .bankrupt-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .bankrupt-modal.show { display: flex; }

        .bankrupt-modal-content {
            text-align: center;
            padding: 50px;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 30px;
            border: 2px solid rgba(231, 76, 60, 0.5);
            box-shadow: 0 0 60px rgba(231, 76, 60, 0.3);
            animation: modalPop 0.5s ease;
        }

        .bankrupt-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        .bankrupt-modal-content h2 {
            color: #e74c3c;
            font-size: 48px;
            margin: 0 0 15px 0;
        }

        .bankrupt-modal-content p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .bankrupt-buttons {
            display: flex;
            justify-content: center;
        }

        .bankrupt-btn {
            padding: 15px 50px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .bankrupt-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .land-modal-header {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(255, 215, 0, 0.05) 100%);
            padding: 25px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .land-modal-icon {
            width: 60px;
            height: 60px;

<body>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        const isHost = urlParams.get('host') === 'true';
        const playerName = urlParams.get('name') || '玩家';

        const PIECES = ['🚗', '🚕', '🚙', '🚌', '🚎', '🏎️', '🚓', '🚑', '🚒', '🚐', '🚚', '🚛', '🚜', '🚲', '🏍️', '✈️'];
        const PIECE_COLORS = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#1abc9c', '#3498db', '#9b59b6', '#e91e63', '#00bcd4', '#8bc34a', '#ff5722', '#795548', '#607d8b', '#ff9800', '#03a9f4', '#673ab7'];
        
        let board = [];
        let players = [];
        let myPiece = null;
        let myColor = null;
        let selectedPiece = null;
        let currentTurn = 0;
        let gameStarted = false;
        let selectionPhase = false;
        let playerPositions = {};
        let currentLandCell = null;
        let currentLandAction = null;

        function getPieceColor(piece) {
            const index = PIECES.indexOf(piece);
            return index >= 0 ? PIECE_COLORS[index] : '#fff';
        }

        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            return audioContext;
        }

        function playDiceSound() {
            initAudio();
            const ctx = audioContext;
            const now = ctx.currentTime;
            
            for (let i = 0; i < 6; i++) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200 + Math.random() * 300, now + i * 0.05);
                gain.gain.setValueAtTime(0.15, now + i * 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.08);
                
                osc.start(now + i * 0.05);
                osc.stop(now + i * 0.05 + 0.08);
            }
        }

        function playBuySound() {
            initAudio();
            const ctx = audioContext;
            const now = ctx.currentTime;
            
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523, now);
            osc.frequency.setValueAtTime(659, now + 0.1);
            osc.frequency.setValueAtTime(784, now + 0.2);
            
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
            
            osc.start(now);
            osc.stop(now + 0.35);
        }

        function playCoinSound() {
            initAudio();
            const ctx = audioContext;
            const now = ctx.currentTime;
            
            [1200, 1600].forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + i * 0.08);
                gain.gain.setValueAtTime(0.2, now + i * 0.08);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.15);
                
                osc.start(now + i * 0.08);
                osc.stop(now + i * 0.08 + 0.15);
            });
        }

        function playPaySound() {
            initAudio();
            const ctx = audioContext;
            const now = ctx.currentTime;
            
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.2);
            
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
            
            osc.start(now);
            osc.stop(now + 0.25);
        }

        function playChanceSound() {
            initAudio();
            const ctx = audioContext;
            const now = ctx.currentTime;
            
            const notes = [392, 440, 494, 523, 587, 659];
            notes.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + i * 0.06);
                gain.gain.setValueAtTime(0.15, now + i * 0.06);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.06 + 0.1);
                
                osc.start(now + i * 0.06);
                osc.stop(now + i * 0.06 + 0.1);
            });
        }

        function playJailSound() {
            initAudio();
            const ctx = audioContext;
            const now = ctx.currentTime;
            
            for (let i = 0; i < 3; i++) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, now + i * 0.3);
                osc.frequency.setValueAtTime(150, now + i * 0.3 + 0.15);
                
                gain.gain.setValueAtTime(0.1, now + i * 0.3);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.3 + 0.25);
                
                osc.start(now + i * 0.3);
                osc.stop(now + i * 0.3 + 0.25);
            }
        }

        function playVictorySound() {
            initAudio();
            const ctx = audioContext;
            const now = ctx.currentTime;
            
            const melody = [
                { freq: 523, time: 0 },
                { freq: 587, time: 0.15 },
                { freq: 659, time: 0.3 },
                { freq: 784, time: 0.45 },
                { freq: 880, time: 0.6 },
                { freq: 1047, time: 0.75 }
            ];
            
            melody.forEach(note => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(note.freq, now + note.time);
                gain.gain.setValueAtTime(0.25, now + note.time);
                gain.gain.exponentialRampToValueAtTime(0.01, now + note.time + 0.2);
                
                osc.start(now + note.time);
                osc.stop(now + note.time + 0.2);
            });
        }

        function playMoveSound() {
            initAudio();
            const ctx = audioContext;
            const now = ctx.currentTime;
            
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            
            osc.start(now);
            osc.stop(now + 0.05);
        }

        function addBroadcast(message, type = '') {
            const list = document.getElementById('broadcastList');
            const item = document.createElement('div');
            item.className = `broadcast-item ${type}`;
            item.textContent = message;
            list.insertBefore(item, list.firstChild);
            
            if (list.children.length > 50) {
                list.removeChild(list.lastChild);
            }
        }

        function showChanceCardAnimation(card, callback) {
            const modal = document.getElementById('chanceModal');
            const cardEl = document.getElementById('chanceCard');
            const rollingEl = document.getElementById('chanceRolling');
            
            modal.classList.add('show');
            cardEl.innerHTML = '<div class="chance-rolling">🎲</div>';
            
            let rollCount = 0;
            const rollInterval = setInterval(() => {

        async function animatePlayerMove(playerIdx, fromPosition, toPosition) {
            const marker = document.getElementById(`marker-${playerIdx}`);
            if (!marker) return;
            
            let totalSteps;
            let isClockwise;
            
            if (toPosition > fromPosition) {
                const diff = toPosition - fromPosition;
                if (diff <= 20) {
                    totalSteps = diff;
                    isClockwise = false;
                } else {
                    totalSteps = 40 - diff;
                    isClockwise = true;
                }
            } else {
                const diff = fromPosition - toPosition;
                if (diff <= 20) {
                    totalSteps = diff;
                    isClockwise = true;
                } else {
                    totalSteps = 40 - diff;
                    isClockwise = false;
                }
            }
            
            let currentPos = fromPosition;
            
            for (let step = 0; step < totalSteps; step++) {
                if (isClockwise) {
                    currentPos = (currentPos - 1 + 40) % 40;
                } else {
                    currentPos = (currentPos + 1) % 40;
                }
                const pos = getCellPosition(currentPos);
                if (pos) {
                    await moveMarkerStep(marker, null, pos, playerIdx);
                }
            }
            
            playerPositions[players[playerIdx].name] = toPosition;
        }

        function celebrateWin() {
            const container = document.createElement('div');
            container.className = 'celebration-container';
            document.body.appendChild(container);

            const emojis = ['🎉', '🎊', '🏆', '🥇', '✨', '🌟', '💫', '🎇', '🎆', '🎈', '🙌', '👏', '🥳', '💰', '💵'];
            const particleCount = 60;
            const duration = 3000;

            function createParticle() {
                const particle = document.createElement('div');
                particle.className = 'celebration-particle';
                particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];

                const startX = window.innerWidth / 2;
                const startY = window.innerHeight + 50;

                const angle = (Math.random() * 120 - 60) * (Math.PI / 180);
                const velocity = 300 + Math.random() * 400;
                const vx = Math.sin(angle) * velocity;
                const vy = -Math.cos(angle) * velocity;

                const rotationSpeed = (Math.random() - 0.5) * 720;
                const gravity = 600;
                const lifeTime = 2000 + Math.random() * 1500;

                particle.style.left = startX + 'px';
                particle.style.top = startY + 'px';
                particle.style.fontSize = (20 + Math.random() * 20) + 'px';

                container.appendChild(particle);

                let x = startX;
                let y = startY;
                let rotation = 0;
                let particleStartTime = Date.now();

                function animate() {
                    const elapsed = (Date.now() - particleStartTime) / 1000;

                    x = startX + vx * elapsed;
                    y = startY + vy * elapsed + 0.5 * gravity * elapsed * elapsed;
                    rotation += rotationSpeed * 0.016;

                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
                    particle.style.opacity = Math.max(0, 1 - elapsed / 3);

                    if (Date.now() - particleStartTime < lifeTime) {
                        requestAnimationFrame(animate);
                    } else {
                        particle.remove();
                    }
                }

                requestAnimationFrame(animate);
            }

            const interval = duration / particleCount;
            let created = 0;

            const createInterval = setInterval(() => {
                createParticle();
                created++;
                if (created >= particleCount) {
                    clearInterval(createInterval);
                }
            }, interval);

            setTimeout(() => {
                container.remove();
            }, duration + 4000);
        }

        function animateRentPayment(cellIndex, ownerName, amount) {
            const cellEl = document.querySelector(`.cell[data-index="${cellIndex}"]`);
            if (!cellEl) return;
            
            const ownerIdx = players.findIndex(p => p.name === ownerName);
            const ownerCard = document.querySelectorAll('.player-card')[ownerIdx];
            if (!ownerCard) return;
            
            const startX = cellEl.offsetLeft + cellEl.offsetWidth / 2;
            const startY = cellEl.offsetTop + cellEl.offsetHeight / 2;
            
            const endX = 110;
            const endY = ownerCard.offsetTop + ownerCard.offsetHeight / 2 + 70;
            
            const moneyCount = Math.min(10, Math.ceil(amount / 500));
            
            for (let i = 0; i < moneyCount; i++) {
                setTimeout(() => {
                    const money = document.createElement('div');
                    money.className = 'money-animation';
                    money.textContent = '💵';
                    money.style.cssText = `
                        position: fixed;
                        left: ${startX}px;
                        top: ${startY}px;
                        font-size: 24px;
                        z-index: 1000;
                        pointer-events: none;
                        transition: none;
                    `;
                    document.body.appendChild(money);
                    
                    setTimeout(() => {
                        const controlX = (startX + endX) / 2 + (Math.random() - 0.5) * 100;
                        const controlY = Math.min(startY, endY) - 100 - Math.random() * 50;
                        
                        money.animate([
                            { left: startX + 'px', top: startY + 'px', opacity: 1, transform: 'scale(1)' },
                            { left: controlX + 'px', top: controlY + 'px', opacity: 1, transform: 'scale(1.2)' },
                            { left: endX + 'px', top: endY + 'px', opacity: 0, transform: 'scale(0.5)' }
                        ], {
                            duration: 800 + Math.random() * 400,
                            easing: 'ease-in-out',
                            fill: 'forwards'
                        });
                        
                        setTimeout(() => money.remove(), 1200);
                    }, 50);
                }, i * 80);
            }
        }

        function updateCellDisplay(cellData) {
            const cellEl = document.querySelector(`.cell[data-index="${cellData.index}"]`);
            if (!cellEl) return;
            
            const existingOwner = cellEl.querySelector('.cell-owner');
            const existingHouses = cellEl.querySelector('.cell-houses');
            if (existingOwner) existingOwner.remove();
            if (existingHouses) existingHouses.remove();
            
            if (cellData.owner) {
                const ownerPlayer = players.find(p => p.name === cellData.owner);
                const ownerColor = ownerPlayer ? getPieceColor(ownerPlayer.piece) : '#fff';
                
                cellEl.style.borderColor = ownerColor;
                cellEl.style.boxShadow = `0 0 10px ${ownerColor}40`;
                
                const housesEl = document.createElement('div');
                housesEl.className = 'cell-houses';
                housesEl.style.cssText = 'font-size: 10px; margin-top: 2px;';
                
                if (cellData.isApartment) {
                    housesEl.textContent = '🏢';
                } else if (cellData.houses > 0) {
                    housesEl.textContent = '🏠'.repeat(cellData.houses);
                }
                
                cellEl.appendChild(housesEl);
            }
        }

            updateWaitingPlayers();
            updatePlayersPanel();
        });

            players = data.players;

        });

            players = data.players;
            updatePlayersPanel();
            updateSelectionSubtitle();

            if (grid.children.length > 0) {
                document.querySelectorAll('.piece-option').forEach(option => {

            board = data.board;
            players = data.players;
            currentTurn = data.currentTurn;
            gameStarted = true;
            
            players.forEach(p => playerPositions[p.name] = p.position);
            
            document.getElementById('countdownOverlay').style.display = 'none';
            document.getElementById('waitingOverlay').style.display = 'none';
            document.getElementById('selectionOverlay').style.display = 'none';
            
            initBoard();
            updatePlayersPanel();
            updatePlayerMarkers();
            
            document.getElementById('rollBtn').style.display = 'block';
            updateTurnStatus();
        });

        socket.on('diceRolled', async (data) => {
            const diceEl = document.getElementById('dice');
            const rollBtn = document.getElementById('rollBtn');
            
            playDiceSound();
            
            diceEl.classList.add('rolling');
            rollBtn.disabled = true;
            
            await new Promise(resolve => setTimeout(resolve, 500));
            
            diceEl.classList.remove('rolling');
            diceEl.textContent = data.dice;
            
            addBroadcast(`${data.playerName} 掷出了 ${data.dice} 点`, '');
            document.getElementById('gameStatus').textContent = 
                `${data.playerName} 掷出了 ${data.dice}`;
            
            const playerIdx = players.findIndex(p => p.name === data.playerName);
            if (playerIdx >= 0) {
                await animatePlayerMove(playerIdx, data.oldPosition, data.newPosition);
            }
            
            players = data.players;
            currentTurn = data.currentTurn;
            updatePlayersPanel();
            
            const isMyAction = players[currentTurn] && players[currentTurn].name === playerName;
            
            if (data.passedStart) {
                playCoinSound();
                addBroadcast(`${data.playerName} 经过起点获得 $2000！`, 'start');
                document.getElementById('gameStatus').textContent = 
                    `${data.playerName} 经过起点获得 $2000！`;
            }
            
            if (data.landAction) {
                if (data.landAction.type === 'rent') {
                    playPaySound();
                    addBroadcast(`${data.playerName} 向 ${data.landAction.owner} 支付过路费 $${data.landAction.amount}`, 'rent');
                    animateRentPayment(data.cell.index, data.landAction.owner, data.landAction.amount);
                    document.getElementById('gameStatus').textContent = 
                        `${data.playerName} 向 ${data.landAction.owner} 支付过路费 $${data.landAction.amount}`;
                } else if (data.landAction.type === 'cannotAfford') {
                    addBroadcast(`${data.playerName} 资金不足，需要出售资产`, 'jail');
                    document.getElementById('gameStatus').textContent = `${data.playerName} 资金不足！`;
                    if (isMyAction) {
                        showSellModal(data.landAction);
                    }
                    return;
                } else if (data.landAction.type === 'bankrupt') {
                    addBroadcast(`${data.playerName} 破产了！`, 'jail');
                    if (isMyAction) {
                        showBankruptModal();
                    } else {
                        currentTurn = data.currentTurn;
                        updatePlayersPanel();
                        updateTurnStatus();
                    }
                    return;
                } else if (data.landAction.type === 'tax') {
                    playPaySound();
                    addBroadcast(`${data.playerName} 缴纳税款 $${data.landAction.amount}`, 'tax');
                    animateTaxPayment(playerIdx, data.cell.index, data.landAction.amount);
                    document.getElementById('gameStatus').textContent = 
                        `${data.playerName} 缴纳税款 $${data.landAction.amount}`;
                } else if (data.landAction.type === 'chance' && data.chanceCard) {
                    playChanceSound();
                    addBroadcast(`${data.playerName} 抽取机会卡：${data.chanceCard.text}`, 'chance');
                    
                    if (isMyAction) {
                        showChanceCardAnimation(data.chanceCard, () => {
                            const hasExtraAction = data.landAction.extraAction;
                            if (hasExtraAction && hasExtraAction.type === 'rent') {
                                const currentPlayer = players[currentTurn];
                                if (currentPlayer && currentPlayer.money < hasExtraAction.amount) {
                                    showSellModal(data.landAction.extraAction);
                                } else {
                                    showLandAction(data.cell, { type: 'rent', ...hasExtraAction }, true);
                                }
                            } else if (hasExtraAction && hasExtraAction.type === 'cannotAfford') {
                                showSellModal(hasExtraAction);
                            } else if (hasExtraAction && hasExtraAction.type === 'bankrupt') {
                                showBankruptModal();
                            } else if (data.cell.type === 'property' && !data.cell.owner) {
                                showLandAction(data.cell, { type: 'canBuy', price: data.cell.price }, true);
                            } else if (data.cell.type === 'property' && data.cell.owner === playerName && !data.cell.isApartment) {
                                showLandAction(data.cell, { type: 'canBuild', houses: data.cell.houses, housePrice: data.cell.housePrice }, true);
                            } else {
                                showLandAction(data.cell, null, true);
                            }
                        });
                    } else {
                        document.getElementById('gameStatus').textContent = 
                            `${data.playerName} 抽取机会卡：${data.chanceCard.text}`;
                        if (data.landAction.extraAction) {
                            addBroadcast(`${data.playerName} 需要支付过路费 $${data.landAction.extraAction.amount}`, 'rent');
                            animateRentPayment(data.cell.index, data.landAction.extraAction.owner, data.landAction.extraAction.amount);
                        }
                    }
                    return;
                } else if (data.landAction.type === 'jail') {
                    playJailSound();
                    addBroadcast(`${data.playerName} 进入监狱！下一回合跳过`, 'jail');
                } else if (data.landAction.type === 'parking') {
                    addBroadcast(`${data.playerName} 停在免费停车站！`, 'parking');
                    document.getElementById('gameStatus').textContent = `${data.playerName} 停在免费停车站！`;
                }
            }
            
            if (isMyAction && data.landAction && data.landAction.type !== 'chance' && data.landAction.type !== 'parking') {
                setTimeout(() => {
                    showLandAction(data.cell, data.landAction, true);
                }, 300);
            } else if (!data.landAction) {
                const currentPlayer = players[currentTurn];
                if (currentPlayer && currentPlayer.name === playerName) {
                    socket.emit('endTurn', { roomId });
                }
                document.getElementById('gameStatus').textContent = 
                    `${data.playerName} 到达 ${data.cell.name}`;
            }
        });

        socket.on('turnSkipped', (data) => {
            playJailSound();
            addBroadcast(`${data.playerName} 在监狱中，回合跳过`, 'jail');
        });

        socket.on('propertyBought', (data) => {
            playBuySound();
            document.getElementById('landModal').classList.remove('show');
            players = data.players;
            currentTurn = data.currentTurn;
            
            if (data.board && board.length > 0) {
                data.board.forEach(serverCell => {
                    const localCell = board[serverCell.index];
                    if (localCell) {
                        localCell.owner = serverCell.owner;
                        localCell.houses = serverCell.houses;
                        localCell.isApartment = serverCell.isApartment;
                    }
                });
            }
            
            updatePlayersPanel();
            updateTurnStatus();
            
            const ownerPlayer = players.find(p => p.name === data.owner);
            const ownerColor = data.ownerColor || (ownerPlayer ? getPieceColor(ownerPlayer.piece) : '#fff');
            
            const cell = board[data.position];
            addBroadcast(`${data.owner} 购买了 ${cell?.name || '地产'}，花费 $${cell?.price || ''}`, 'buy');
            document.getElementById('gameStatus').textContent = 
                `${data.owner} 购买了 ${cell?.name || '地产'}！`;
            
            const cellEl = document.querySelector(`.cell[data-index="${data.position}"]`);
            if (cellEl) {
                cellEl.style.background = ownerColor;
                cellEl.style.borderColor = ownerColor;
                cellEl.style.boxShadow = `0 0 15px ${ownerColor}60`;
            }
        });

        socket.on('houseBuilt', (data) => {
            playBuySound();
            document.getElementById('landModal').classList.remove('show');
            players = data.players;
            currentTurn = data.currentTurn;
            
            if (data.board && board.length > 0) {
                data.board.forEach(serverCell => {
                    const localCell = board[serverCell.index];
                    if (localCell) {
                        localCell.owner = serverCell.owner;
                        localCell.houses = serverCell.houses;
                        localCell.isApartment = serverCell.isApartment;
                    }
                });
            }
            
            updatePlayersPanel();
            updateTurnStatus();
            
            const player = players.find(p => p.name === data.owner);
            let message = `${player?.name || '玩家'} 在 ${data.cellName} 建了一座房子`;
            if (data.isApartment) {
                message = `${player?.name || '玩家'} 的 ${data.cellName} 升级为高级公寓！`;
            }
            
            addBroadcast(message, 'build');
            document.getElementById('gameStatus').textContent = message;
            
            const cellEl = document.querySelector(`.cell[data-index="${data.position}"]`);
            if (cellEl) {
                const housesEl = cellEl.querySelector('.cell-houses');
                if (housesEl) housesEl.remove();
                
                const newHousesEl = document.createElement('div');
                newHousesEl.className = 'cell-houses';
                newHousesEl.style.cssText = 'font-size: 10px; margin-top: 2px;';
                
                if (data.isApartment) {
                    newHousesEl.textContent = '🏢';
                } else if (data.houses > 0) {
                    newHousesEl.textContent = '🏠'.repeat(data.houses);
                }
                
                cellEl.appendChild(newHousesEl);
            }
        });

        socket.on('turnChanged', (data) => {
            currentTurn = data.currentTurn;
            updatePlayersPanel();
            updateTurnStatus();
            document.getElementById('landModal').classList.remove('show');
            document.getElementById('sellModal').classList.remove('show');
        });

        socket.on('propertySold', (data) => {
            players = players.map(p => {
                if (p.name === data.seller) {
                    return { ...p, money: (p.money || 0) + data.sellPrice };
                }
                return p;
            });
            updatePlayersPanel();
            
            const cell = board[data.position];
            addBroadcast(`${data.seller} 变卖 ${cell?.name || '地产'}，获得 $${data.sellPrice}`, 'sell');
            
            if (data.board && board.length > 0) {
                data.board.forEach(serverCell => {
                    const localCell = board[serverCell.index];
                    if (localCell) {
                        localCell.owner = serverCell.owner;
                        localCell.houses = serverCell.houses;
                        localCell.isApartment = serverCell.isApartment;
                    }
                });
            }
            updateCellDisplay({ index: data.position, owner: null, houses: 0, isApartment: false });
            
            const cellEl = document.querySelector(`.cell[data-index="${data.position}"]`);
            if (cellEl) {
                cellEl.style.background = 'rgba(255, 255, 255, 0.15)';
                cellEl.style.borderColor = 'rgba(255, 255, 255, 0.25)';
                cellEl.style.boxShadow = 'none';
            }
        });

        socket.on('houseSold', (data) => {
            players = players.map(p => {
                if (p.name === data.seller) {
                    return { ...p, money: (p.money || 0) + data.sellPrice };
                }
                return p;
            });
            updatePlayersPanel();
            
            const cell = board[data.position];
            addBroadcast(`${data.seller} 出售 ${cell?.name || '地产'} 房屋，获得 $${data.sellPrice}`, 'sell');
            
            if (data.board && board.length > 0) {
                data.board.forEach(serverCell => {
                    const localCell = board[serverCell.index];
                    if (localCell) {
                        localCell.owner = serverCell.owner;
                        localCell.houses = serverCell.houses;
                        localCell.isApartment = serverCell.isApartment;
                    }
                });
            }
            
            const cellEl = document.querySelector(`.cell[data-index="${data.position}"]`);
            if (cellEl) {
                const housesEl = cellEl.querySelector('.cell-houses');
                if (housesEl) housesEl.remove();
                
                if (data.isApartment) {
                    const newHousesEl = document.createElement('div');
                    newHousesEl.className = 'cell-houses';
                    newHousesEl.style.cssText = 'font-size: 10px; margin-top: 2px;';
                    newHousesEl.textContent = '🏠🏠';
                    cellEl.appendChild(newHousesEl);
                } else if (data.houses > 0) {
                    const newHousesEl = document.createElement('div');
                    newHousesEl.className = 'cell-houses';
                    newHousesEl.style.cssText = 'font-size: 10px; margin-top: 2px;';
                    newHousesEl.textContent = '🏠'.repeat(data.houses);
                    cellEl.appendChild(newHousesEl);
                }
            }
        });

        socket.on('stillCannotAfford', (data) => {
            players = players.map(p => {
                return { ...p, money: p.money };
            });
            updatePlayersPanel();
            
            const isMyAction = data.seller === playerName;
            if (isMyAction) {
                showSellModal({
                    amount: data.amount,
                    paid: data.paid,
                    owner: data.owner,
                    sellableProperties: data.sellableProperties
                });
            }
        });

        socket.on('rentPaid', (data) => {
            document.getElementById('sellModal').classList.remove('show');
            players = data.players;
            currentTurn = data.currentTurn;
            updatePlayersPanel();
            updateTurnStatus();
            
            addBroadcast(`${data.playerName} 向 ${data.owner} 支付过路费 $${data.amount}`, 'rent');
            
            board = data.board;
            
            const isMyTurn = players[currentTurn]?.name === playerName;
            if (isMyTurn) {
                socket.emit('endTurn', { roomId });
            }
        });

        socket.on('playerBankrupt', (data) => {
            const bankruptPlayer = players.find(p => p.name === data.playerName);
            if (bankruptPlayer) {
                bankruptPlayer.bankrupt = true;
            }
            
            if (data.board && board.length > 0) {
                data.board.forEach(serverCell => {
                    const localCell = board[serverCell.index];
                    if (localCell) {
                        localCell.owner = serverCell.owner;
                        localCell.houses = serverCell.houses;
                        localCell.isApartment = serverCell.isApartment;
                    }
                });
            }
            
            data.board.forEach((cell, idx) => {
                if (!cell.owner) {
                    const cellEl = document.querySelector(`.cell[data-index="${idx}"]`);
                    if (cellEl) {
                        cellEl.style.background = 'rgba(255, 255, 255, 0.15)';
                        cellEl.style.borderColor = 'rgba(255, 255, 255, 0.25)';
                        cellEl.style.boxShadow = 'none';
                        const housesEl = cellEl.querySelector('.cell-houses');
                        if (housesEl) housesEl.remove();
                    }
                }
            });
            
            addBroadcast(`${data.playerName} 破产了！`, 'jail');
            
            const bankruptIdx = players.findIndex(p => p.name === data.playerName);
            if (bankruptIdx >= 0) {
                const marker = document.getElementById(`marker-${bankruptIdx}`);
                if (marker) marker.remove();
            }
            
            updatePlayersPanel();
        });

        socket.on('gameWinner', (data) => {
            playVictorySound();
            addBroadcast(`🏆 游戏结束！${data.winner} 获胜！`, 'win');
            document.getElementById('gameStatus').textContent = `🏆 ${data.winner} 获胜！`;
            document.getElementById('rollBtn').style.display = 'none';
            
            showWinResult(data.winner);
        });

        socket.on('error', (data) => {
            alert(data.message);
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            const room = new URLSearchParams(window.location.search).get('room');
            socket.emit('startMonopolySelection', { roomId: room });
        });

        document.getElementById('addRobotBtn').addEventListener('click', () => {
            const room = new URLSearchParams(window.location.search).get('room');
            socket.emit('addRobot', { roomId: room });
        });

        socket.on('robotAdded', (data) => {
            players = data.players;
            updateWaitingPlayers();
        });

        socket.on('robotRemoved', (data) => {
            players = data.players;
            updateWaitingPlayers();
        });

        document.getElementById('confirmPiece').addEventListener('click', () => {
            if (selectedPiece) {
                const room = new URLSearchParams(window.location.search).get('room');
                socket.emit('selectMonopolyPiece', { roomId: room, piece: selectedPiece });
                myPiece = selectedPiece;
                myColor = getPieceColor(selectedPiece);
                document.getElementById('confirmPiece').disabled = true;
                document.getElementById('confirmPiece').textContent = '已选择';
            }
        });

        document.getElementById('rollBtn').addEventListener('click', () => {
            const room = new URLSearchParams(window.location.search).get('room');
            socket.emit('rollDice', { roomId: room });
        });

        document.getElementById('resultBtn').addEventListener('click', () => {
            document.getElementById('resultModal').classList.remove('show');
            const room = new URLSearchParams(window.location.search).get('room');
            if (room) {
                socket.emit('leaveMonopolyRoom', { roomId: room });
            }
            window.close();
            setTimeout(() => {
                window.location.href = '/';
            }, 100);
        });

        document.getElementById('exitBtn').addEventListener('click', () => {
            if (confirm('确定要退出游戏吗？')) {
                const room = new URLSearchParams(window.location.search).get('room');
                if (room) {
                    socket.emit('leaveMonopolyRoom', { roomId: room });
                }
                window.close();
                setTimeout(() => {
                    window.location.href = '/';
                }, 100);
            }
        });

        window.addEventListener('beforeunload', () => {
            const room = new URLSearchParams(window.location.search).get('room');
            if (room) {
                socket.emit('leaveMonopolyRoom', { roomId: room });
            }
        });
    </script>
</body>
</html>
